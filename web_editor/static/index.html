<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cartoon DSL Live Editor</title>
  <meta name="theme-color" content="#0f766e" />
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Cartoon DSL Live Editor</h1>
        <p>Visual blocks -> deterministic DSL -> live SVG preview</p>
      </div>
      <div class="badge-row">
        <span class="badge">vector-first</span>
        <span class="badge">single + multi</span>
        <span class="badge">physics-aware</span>
      </div>
    </header>

    <main class="layout">
      <section class="panel controls">
        <h2>Scene</h2>
        <div class="grid two">
          <label>Preview Engine
            <select id="previewEngine">
              <option value="local">Local Wasm/Pyodide</option>
              <option value="server">Server API</option>
            </select>
          </label>
          <label>Mode
            <select id="sceneMode">
              <option value="single">Single Character</option>
              <option value="multi">Multi Character</option>
            </select>
          </label>
          <label>Seconds
            <input id="seconds" type="number" min="0.2" step="0.1" value="3.5" />
          </label>
          <label>Width
            <input id="canvasW" type="number" min="320" step="10" value="960" />
          </label>
          <label>Height
            <input id="canvasH" type="number" min="180" step="10" value="540" />
          </label>
          <label>FPS
            <input id="fps" type="number" min="1" step="1" value="24" />
          </label>
          <label>Ground Preview Frame
            <input id="frameIndex" type="number" min="0" step="1" value="0" />
          </label>
        </div>

        <h2>Style Char1</h2>
        <div class="grid two">
          <label>Seed
            <input id="seed1" type="text" value="EDITOR-ALPHA" />
          </label>
          <label>Render
            <select id="mode1">
              <option value="stick">Stick</option>
              <option value="mesh">Mesh</option>
            </select>
          </label>
          <label>Line
            <input id="line1" type="number" min="1" step="0.1" value="7" />
          </label>
          <label>Limb
            <input id="limb1" type="number" min="1" step="0.1" value="10" />
          </label>
          <label>Head
            <input id="head1" type="number" min="4" step="0.1" value="28" />
          </label>
          <label>Jitter
            <input id="jitter1" type="number" min="0" step="0.1" value="1.0" />
          </label>
          <label>Mesh Asset
            <input id="mesh1" type="text" value="assets/meshes/default/mesh.json" />
          </label>
          <label>Tint
            <input id="tint1" type="text" value="#2f2f2f" />
          </label>
        </div>

        <div id="char2StyleWrap" class="hidden">
          <h2>Style Char2</h2>
          <div class="grid two">
            <label>Seed
              <input id="seed2" type="text" value="EDITOR-BETA" />
            </label>
            <label>Render
              <select id="mode2">
                <option value="stick">Stick</option>
                <option value="mesh">Mesh</option>
              </select>
            </label>
            <label>Line
              <input id="line2" type="number" min="1" step="0.1" value="7" />
            </label>
            <label>Limb
              <input id="limb2" type="number" min="1" step="0.1" value="10" />
            </label>
            <label>Head
              <input id="head2" type="number" min="4" step="0.1" value="28" />
            </label>
            <label>Jitter
              <input id="jitter2" type="number" min="0" step="0.1" value="1.05" />
            </label>
            <label>Mesh Asset
              <input id="mesh2" type="text" value="assets/meshes/default/mesh.json" />
            </label>
            <label>Tint
              <input id="tint2" type="text" value="#3a3a3a" />
            </label>
          </div>
        </div>

        <h2>Physics</h2>
        <div class="grid two">
          <label>Mode
            <select id="physicsMode">
              <option value="off">off</option>
              <option value="auto">auto</option>
              <option value="fallback">fallback</option>
              <option value="pymunk">pymunk</option>
            </select>
          </label>
          <label>Gravity
            <input id="gravity" type="number" step="10" value="980" />
          </label>
          <label>Damping
            <input id="damping" type="number" min="0" max="1" step="0.01" value="0.92" />
          </label>
          <label>Restitution
            <input id="restitution" type="number" min="0" max="1" step="0.01" value="0.22" />
          </label>
          <label>Friction
            <input id="friction" type="number" min="0" max="1" step="0.01" value="0.85" />
          </label>
          <label>Substeps
            <input id="substeps" type="number" min="1" max="8" step="1" value="2" />
          </label>
        </div>

        <h2>Camera 2.5D</h2>
        <div class="grid two">
          <label>Enabled
            <select id="cameraEnabled">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </label>
          <label>Focus
            <input id="cameraFocus" type="text" value="auto" />
          </label>
          <label>Zoom
            <input id="cameraZoom" type="number" step="0.01" value="1.05" />
          </label>
          <label>Pan
            <input id="cameraPan" type="text" value="0,0" />
          </label>
          <label>Depth
            <select id="cameraDepth">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </label>
          <label>Parallax
            <input id="cameraParallax" type="number" step="0.01" value="0.2" />
          </label>
          <label>Depth Min
            <input id="cameraDepthMin" type="number" step="0.01" value="0.82" />
          </label>
          <label>Depth Max
            <input id="cameraDepthMax" type="number" step="0.01" value="1.18" />
          </label>
          <label>Y Sort
            <select id="cameraYSort">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </label>
          <label>Shake On Impact
            <select id="cameraShake">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </label>
          <label>Shake Amp
            <input id="cameraShakeAmp" type="number" step="0.1" value="14" />
          </label>
          <label>Shake Freq
            <input id="cameraShakeFreq" type="number" step="0.1" value="14" />
          </label>
          <label>Shake Decay
            <input id="cameraShakeDecay" type="number" step="0.1" value="4.8" />
          </label>
        </div>

        <h2>Blocks</h2>
        <div class="row">
          <select id="nodeType">
            <option value="walk">walk</option>
            <option value="ai_motion">ai_motion</option>
            <option value="chase">chase</option>
            <option value="wave">wave</option>
            <option value="impact">impact</option>
            <option value="take">take</option>
            <option value="anticipation">anticipation</option>
            <option value="duel_collision">duel_collision</option>
            <option value="wall">wall</option>
            <option value="trapdoor">trapdoor</option>
            <option value="anvil">anvil</option>
          </select>
          <button id="addNodeBtn" type="button">Add Block</button>
          <button id="resetBtn" type="button">Reset Template</button>
        </div>
        <div id="nodes" class="nodes"></div>

        <h2>Generated DSL</h2>
        <textarea id="dsl" spellcheck="false"></textarea>
        <div class="row">
          <button id="previewBtn" type="button">Render Preview</button>
          <label class="checkbox"><input id="autoPreview" type="checkbox" checked /> Auto</label>
          <span id="status" class="status">ready</span>
        </div>
      </section>

      <section class="panel preview">
        <h2>Preview</h2>
        <div id="previewMeta" class="meta">No preview yet.</div>
        <div class="row preview-controls">
          <button id="playPauseBtn" type="button" aria-pressed="false">Play</button>
          <button id="stopBtn" type="button">Stop</button>
          <label class="checkbox"><input id="loopPlayback" type="checkbox" checked /> Loop</label>
          <label class="scrub">Timeline
            <input id="timelineFrame" type="range" min="0" max="0" step="1" value="0" />
          </label>
          <span id="timelineLabel" class="timeline-label">frame 0/0 | t=0.00s</span>
        </div>
        <div id="svgViewport" class="viewport"></div>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/static/service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
